services:
  postgres:
    image: postgres:15
    container_name: wellness-postgres
    restart: always
    environment:
      POSTGRES_USER: wellness
      POSTGRES_PASSWORD: wellness
      POSTGRES_DB: wellness_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: wellness-backend
    command: npm run start:dev
    environment:
      DATABASE_URL: postgresql://wellness:wellness@postgres:5432/wellness_db
      JWT_ACCESS_SECRET: dev_access_secret
      JWT_REFRESH_SECRET: dev_refresh_secret
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: wellness-frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
