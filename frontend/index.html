<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>numbers-dont-lie | Consent Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #05060a;
        --panel: #0f1118;
        --muted: #9aa0b5;
        --primary: #6cf0c2;
        --primary-strong: #2fdc9b;
        --danger: #ff6b6b;
        --radius: 12px;
        --border: #1c2030;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 20%, rgba(108, 240, 194, 0.08), transparent 25%),
          radial-gradient(circle at 80% 0%, rgba(255, 255, 255, 0.06), transparent 30%),
          var(--bg);
        color: #e8ecf5;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        display: flex;
        justify-content: center;
        padding: 40px 16px 64px;
      }

      .page {
        width: min(960px, 100%);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        font-size: 12px;
        margin: 0;
      }

      h1 {
        font-size: clamp(26px, 5vw, 36px);
        margin: 0;
      }

      .lede {
        margin: 0;
        color: var(--muted);
        max-width: 640px;
        line-height: 1.6;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.25);
      }

      .status {
        display: flex;
        gap: 12px;
        align-items: center;
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--muted);
      }

      .dot.ok {
        background: var(--primary);
        box-shadow: 0 0 0 6px rgba(108, 240, 194, 0.12);
      }

      .dot.bad {
        background: var(--danger);
        box-shadow: 0 0 0 6px rgba(255, 107, 107, 0.1);
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 10px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 14px;
        color: var(--muted);
      }

      input {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0b0d13;
        color: #e8ecf5;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(108, 240, 194, 0.14);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 16px 0;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        background: #131722;
        color: #e8ecf5;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      }

      button.primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        color: #051008;
        border-color: #44d9ad;
      }

      button.danger {
        border-color: #ff8282;
        background: rgba(255, 107, 107, 0.12);
        color: #ffc7c7;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: var(--primary);
      }

      .consent-state {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 6px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(108, 240, 194, 0.1);
        border: 1px solid rgba(108, 240, 194, 0.3);
        color: var(--primary);
        font-weight: 600;
        width: fit-content;
      }

      .badge.off {
        background: rgba(255, 107, 107, 0.08);
        border-color: rgba(255, 107, 107, 0.3);
        color: #ffb0b0;
      }

      .log {
        margin-top: 12px;
        border-top: 1px solid var(--border);
        padding-top: 12px;
        max-height: 200px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .log-entry {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .form-grid {
          grid-template-columns: 1fr;
        }

        .actions {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <p class="eyebrow">Consent · Data usage</p>
        <h1>Numbers Don't Lie — Privacy Console</h1>
        <p class="lede">
          Manage AI/health data consent, view the latest consent timestamp, and ensure anything sent to
          AI is pseudonymous and stripped of PII.
        </p>
      </header>

      <section class="panel" id="status-panel">
        <div class="status">
          <span class="dot" id="health-dot"></span>
          <div>
            <div id="health-text">Pinging backend…</div>
            <div class="lede" id="health-subtext"></div>
          </div>
        </div>
      </section>

      <section class="panel" id="consent-panel">
        <div class="form-grid">
          <label>
            API base URL
            <input id="api-base" type="text" autocomplete="off" />
          </label>
          <label>
            Access token (JWT)
            <input id="access-token" type="password" autocomplete="off" />
          </label>
        </div>

        <div class="actions">
          <button id="load-consent">Fetch consent status</button>
          <button class="primary" id="grant-consent">Give consent</button>
          <button class="danger" id="revoke-consent">Revoke consent</button>
        </div>

        <div class="consent-state">
          <div>
            <div class="lede">Status</div>
            <div id="consent-badge" class="badge off">Unknown</div>
          </div>
          <div>
            <div class="lede">Last updated</div>
            <div id="consent-updated">—</div>
          </div>
        </div>

        <div class="log" id="consent-log"></div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
